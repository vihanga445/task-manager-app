<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white text-center">
          <h3><i class="bi bi-person-lock"></i> Login</h3>
        </div>
        <div class="card-body">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" formControlName="username" class="form-control" 
                     placeholder="Enter username">
              <small class="text-danger" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
                Username is required.
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" formControlName="password" class="form-control" 
                     placeholder="Enter password">
              <small class="text-danger" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                Password is required.
              </small>
            </div>

            <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary w-100">
              Login
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
