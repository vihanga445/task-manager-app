<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow-lg border-0"> <div class="card-header bg-primary text-white text-center py-3">
          <h3 class="mb-0"><i class="bi bi-person-lock"></i> Login</h3>
        </div>
        <div class="card-body p-4">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label fw-bold">Username</label>
              <input type="text" formControlName="username" class="form-control shadow-sm" 
                     placeholder="Enter username"
                     [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
              <small class="text-danger" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
                Username is required.
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Password</label>
              <div class="input-group shadow-sm">
                <input [type]="showPassword ? 'text' : 'password'" 
                       formControlName="password" 
                       class="form-control" 
                       placeholder="Enter password"
                       [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                <button class="btn btn-outline-secondary border-secondary-subtle" 
                        type="button" 
                        (click)="togglePasswordVisibility()">
                  <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
              </div>
              <small class="text-danger" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                Password is required.
              </small>
            </div>

            <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary w-100 py-2 mt-2 shadow-sm fw-bold">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>

            <div class="text-center mt-3">
              <p class="text-muted small mb-0">New to TaskManager?</p>
              <a routerLink="/register" class="text-primary fw-bold text-decoration-none small">
                Create an account <i class="bi bi-arrow-right-short"></i>
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
