
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-header" [ngClass]="isEditMode ? 'bg-info text-white' : 'bg-dark text-white'">
          <h3 class="mb-0">{{ isEditMode ? 'Edit Task' : 'Create New Task' }}</h3>
        </div>
        <div class="card-body p-4">
          <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label fw-bold">Task Title</label>
              <input type="text" formControlName="title" class="form-control" placeholder="What needs to be done?">
              <small class="text-danger" *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
                Title is required (max 50 chars).
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Description</label>
              <textarea formControlName="description" class="form-control" rows="3" placeholder="Add some details..."></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Status</label>
              <select formControlName="status" class="form-select">
                <option value="TO_DO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
              </select>
            </div>

            <div class="d-flex gap-2 mt-4">
              <button type="submit" [disabled]="taskForm.invalid" class="btn flex-grow-1"
                      [ngClass]="isEditMode ? 'btn-info text-white' : 'btn-success'">
                <i class="bi bi-save"></i> {{ isEditMode ? 'Update Task' : 'Save Task' }}
              </button>
              <button type="button" class="btn btn-outline-secondary" routerLink="/tasks">Cancel</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
