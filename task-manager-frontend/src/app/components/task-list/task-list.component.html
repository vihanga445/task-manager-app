<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-list-check text-primary"></i> My Tasks</h2>
    
    <div class="d-flex gap-2">
      <button class="btn btn-primary shadow-sm" routerLink="/add-task">
        <i class="bi bi-plus-lg"></i> Add New Task
      </button>
      
      <button class="btn btn-outline-danger shadow-sm" (click)="onLogout()">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </div>
  </div>

  <div class="btn-group mb-3 shadow-sm" role="group">
    <button type="button" class="btn btn-outline-secondary" 
            [class.active]="selectedStatus === 'ALL'" 
            (click)="filterTasks('ALL')">All</button>
    
    <button type="button" class="btn btn-outline-secondary" 
            [class.active]="selectedStatus === 'TO_DO'" 
            (click)="filterTasks('TO_DO')">To Do</button>
    
    <button type="button" class="btn btn-outline-secondary" 
            [class.active]="selectedStatus === 'IN_PROGRESS'" 
            (click)="filterTasks('IN_PROGRESS')">In Progress</button>
    
    <button type="button" class="btn btn-outline-secondary" 
            [class.active]="selectedStatus === 'DONE'" 
            (click)="filterTasks('DONE')">Done</button>
  </div>

  <div class="card shadow border-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-3">Title</th>
            <th>Description</th>
            <th>Status</th>
            <th class="text-end pe-3">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let task of tasks">
            <td class="ps-3 fw-bold">
              <a [routerLink]="['/tasks', task.id]" class="task-link">
                {{ task.title }}
              </a>
            </td>
            
            <td class="text-muted text-truncate" style="max-width: 250px;">
              {{ task.description }}
            </td>
            
            <td>
              <span class="badge rounded-pill" 
                    [ngClass]="{
                      'bg-success': task.status === 'DONE', 
                      'bg-warning text-dark': task.status === 'IN_PROGRESS', 
                      'bg-secondary': task.status === 'TO_DO'
                    }">
                {{ task.status }}
              </span>
            </td>
            
            <td class="text-end pe-3">
              <button class="btn btn-sm btn-outline-primary me-2" [routerLink]="['/edit-task', task.id]">
                <i class="bi bi-pencil"></i>
              </button>
              <button (click)="onDelete(task.id)" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>

          <tr *ngIf="tasks.length === 0">
            <td colspan="4" class="text-center py-5 text-muted">
              <i class="bi bi-clipboard-x display-4 d-block mb-2"></i>
              No tasks found for "{{selectedStatus}}".
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
