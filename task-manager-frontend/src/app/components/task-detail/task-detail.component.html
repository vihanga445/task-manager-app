<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
          <button class="btn btn-sm btn-outline-secondary" routerLink="/tasks">
            <i class="bi bi-arrow-left"></i> Back to List
          </button>
          <span class="badge rounded-pill px-3 py-2" 
                [ngClass]="{
                  'bg-success': task?.status === 'DONE', 
                  'bg-warning text-dark': task?.status === 'IN_PROGRESS', 
                  'bg-secondary': task?.status === 'TO_DO'
                }">
            {{ task?.status }}
          </span>
        </div>

        <div class="card-body p-5">
          <h1 class="display-5 fw-bold text-dark mb-4">{{ task?.title }}</h1>
          <hr class="my-4">
          <h5 class="text-primary fw-bold mb-3"><i class="bi bi-justify-left"></i> Description</h5>
          <p class="lead text-muted bg-light p-4 rounded-3" style="min-height: 150px; white-space: pre-wrap;">
            {{ task?.description || 'No detailed description provided for this task.' }}
          </p>
        </div>

        <div class="card-footer bg-white border-0 d-flex gap-2 p-4">
          <button class="btn btn-primary px-4" [routerLink]="['/edit-task', task?.id]">
            <i class="bi bi-pencil"></i> Edit Task
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
