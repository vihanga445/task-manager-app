
server.port=8091

# 2. IMPORT THE SECRETS
# This tells Spring to look one folder up for the .env file
spring.config.import=optional:file:../.env[.properties]

# 3. DATABASE CONNECTION
# We use the ${VARIABLE} syntax to pull values from the .env file
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 4. JPA & HIBERNATE (The Database Architect)
# 'update' automatically creates your tables based on your Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true

# 5. ROUTING STRATEGY
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER